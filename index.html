    :root {
      --primary: #00c853;

      --blue: #4285f4;
      --dark: #121212;
      --light: #f5f5f5;
      --card-bg: #1f1f1f;
    }
    body {
      background: linear-gradient(135deg, var(--dark), #1a1a2e);
      color: var(--light);
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      display: block;
      margin: 0 auto 15px auto;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      border: none;
      color: white;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover {
      transform: scale(1.03);
    }
    .website-section {
      text-align: center;
      margin-top: 30px;
    }
    .website-section h3 {
      margin-bottom: 10px;
      color: var(--blue);
    }
  </style>
</head>

  <div class="container">

    <!-- ✅ বাটন - ক্লিক করলে Adsgram দেখাবে এবং শেষ হলে অটো রিডাইরেক্ট -->

    </div>
  </div>

  <script>
    // ============================================
    // গ্লোবাল ভেরিয়েবল
    // ============================================
    let redirectUrl = null; // যে লিংকে রিডাইরেক্ট হবে

    // ============================================
    // Adsgram ফাংশন (ম্যানুয়ালি কল করার জন্য)
    // ============================================
    window.showAdsgramAd = function(url) {
      const blockId = "int-24791";
      redirectUrl = url; // রিডাইরেক্ট URL সেভ করে রাখি
      
      if (typeof Adsgram === 'undefined') {
        console.log('Adsgram SDK লোড হয়নি');
        // SDK না থাকলে সরাসরি রিডাইরেক্ট
        window.location.href = redirectUrl;
        return;
      }
      
      // Adsgram দেখাই
      Adsgram.init({ blockId }).show()
        .then(() => {
          console.log('✅ Adsgram ad shown successfully');
          localStorage.setItem('adWatched', Date.now());
          // Adsgram শেষ - এখন অটো রিডাইরেক্ট
          window.location.href = redirectUrl;
        })
        .catch(error => {
          console.log('❌ Adsgram ad error:', error);
          // এরর হলেও রিডাইরেক্ট করব
          window.location.href = redirectUrl;
        });
    };

    // ============================================
    // ভিডিও ক্লিক হ্যান্ডলার
    // ============================================
    function handleVideoClick(url) {
      // সরাসরি Adsgram ফাংশন কল করি
      window.showAdsgramAd(url);
    }

    // ============================================
    // অটো রিডাইরেক্ট স্ক্রিপ্ট বন্ধ করা হল
