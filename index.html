  <!-- ✅ Adsgram Auto Ad Script (৫ সেকেন্ড পর) -->

  <script>

    (function() {

      const blockId = "int-24791";

      

      setTimeout(() => {

        if (typeof Adsgram === 'undefined') {

          console.log(' SDK লোড হয়নি');

          return;

        }

        

        Adsgram.init({ blockId }).show()

          .then(() => {

            console.log('✅ বিভিও দেখানো হয়েছে');

            localStorage.setItem('adWatched', Date.now());

          })

          .catch(error => {

            console.log('⛔ এরর:', error.description);

          });

      }, 5000);

    })();

  </script>
